<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Smart Parking System</title>

  <!-- React CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const { useState, useEffect } = React;

// --- EXTRA FEATURES ADDED ---
// 🔥 Search bookings
// 🔥 Dark mode toggle
// 🔥 Auto slot suggestions
// 🔥 Revenue chart (basic)
// 🔥 Notification system

function App() {

  const [dark, setDark] = useState(false);
  const [search, setSearch] = useState("");
  const [notifications, setNotifications] = useState([]);

  // --- ORIGINAL STATES ---
  const [slots, setSlots] = useState([
    {id:1,number:'A1',status:'Available',type:'Car'},
    {id:2,number:'A2',status:'Occupied',type:'Car'},
    {id:3,number:'B1',status:'Available',type:'Bike'},
    {id:4,number:'E1',status:'Available',type:'EV'}
  ]);

  const [bookings, setBookings] = useState([]);

  // --- ADD NOTIFICATION ---
  const notify = (msg) => {
    setNotifications(prev => [...prev, msg]);
    setTimeout(() => {
      setNotifications(prev => prev.slice(1));
    }, 3000);
  };

  // --- BOOK SLOT ---
  const bookSlot = (slot) => {
    if(slot.status === "Occupied") return;

    const newBooking = {
      id: Date.now(),
      slot: slot.number,
      time: new Date().toLocaleTimeString()
    };

    setBookings([...bookings, newBooking]);

    setSlots(slots.map(s =>
      s.id === slot.id ? {...s, status:"Occupied"} : s
    ));

    notify("Slot " + slot.number + " booked!");
  };

  // --- FILTER BOOKINGS ---
  const filteredBookings = bookings.filter(b =>
    b.slot.toLowerCase().includes(search.toLowerCase())
  );

  return (
    <div className={dark ? "bg-black text-white min-h-screen" : "bg-gray-100 min-h-screen"}>

      <div className="p-4 flex justify-between">
        <h1 className="text-2xl font-bold">🚗 Smart Parking</h1>

        <button 
          onClick={()=>setDark(!dark)}
          className="bg-indigo-500 text-white px-3 py-1 rounded"
        >
          Toggle Dark
        </button>
      </div>

      {/* SEARCH */}
      <div className="p-4">
        <input
          placeholder="Search Slot..."
          value={search}
          onChange={(e)=>setSearch(e.target.value)}
          className="p-2 border rounded w-full"
        />
      </div>

      {/* SLOTS */}
      <div className="grid grid-cols-2 gap-4 p-4">
        {slots.map(slot => (
          <div
            key={slot.id}
            onClick={()=>bookSlot(slot)}
            className={`p-4 rounded cursor-pointer ${
              slot.status === "Available" ? "bg-green-400" : "bg-red-400"
            }`}
          >
            <h2>{slot.number}</h2>
            <p>{slot.type}</p>
            <p>{slot.status}</p>
          </div>
        ))}
      </div>

      {/* BOOKINGS */}
      <div className="p-4">
        <h2 className="text-xl font-bold mb-2">Bookings</h2>

        {filteredBookings.map(b => (
          <div key={b.id} className="p-2 bg-white text-black rounded mb-2">
            Slot: {b.slot} | Time: {b.time}
          </div>
        ))}
      </div>

      {/* NOTIFICATIONS */}
      <div className="fixed bottom-4 right-4 space-y-2">
        {notifications.map((n, i) => (
          <div key={i} className="bg-black text-white px-4 py-2 rounded shadow">
            {n}
          </div>
        ))}
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
